
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aura Finance | Mindful Wealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Shim process.env for browser compatibility
      window.process = window.process || { env: { API_KEY: '' } };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              aura: {
                pink: '#fb7185',
                blush: '#fff1f2',
                peony: '#fda4af',
                rose: '#f43f5e',
                quartz: '#fff5f7',
                berry: '#881337',
                lavender: '#f5d0fe',
                charcoal: '#1a1617',
              }
            },
            animation: {
              'aura-breath': 'aura-breath 15s ease-in-out infinite alternate',
              'spin-slow': 'spin 12s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'pulse-soft': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'aura-breath': {
                '0%': { transform: 'scale(1) translate(0, 0)', opacity: 0.3 },
                '100%': { transform: 'scale(1.3) translate(5%, 5%)', opacity: 0.6 },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; transition: background-color 0.8s ease; overflow-x: hidden; }
      .font-serif { font-family: 'Playfair Display', serif; }
      .grain-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.08;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .bg-aura-glow { background: radial-gradient(circle at center, rgba(251, 113, 133, 0.15) 0%, transparent 70%); }
      .prismatic-glass { backdrop-filter: blur(40px); border: 1px solid rgba(251, 113, 133, 0.25); box-shadow: 0 10px 40px -10px rgba(251, 113, 133, 0.15); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: #fb718566; border-radius: 10px; }
      .text-glow { text-shadow: 0 0 10px rgba(251, 113, 133, 0.5); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "htm": "https://esm.sh/htm"
  }
}
</script>
</head>
  <body class="bg-aura-quartz dark:bg-[#1a1617] text-stone-900 dark:text-stone-100 min-h-screen">
    <div class="grain-overlay"></div>
    <div class="fixed inset-0 bg-aura-glow pointer-events-none"></div>
    <div id="root"></div>
    <script type="module" src="./index.js"></script>
  </body>
</html>
